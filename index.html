<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Task Manager — Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/base.css">
    
    <style>
        /* =========================================================
           LOGIN PAGE — scoped styles
           Uses base.css tokens; no extra stylesheet needed.
           ========================================================= */

        /* Canvas + scanlines (mirrors dashboard) */
        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.025) 2px,
                rgba(0,0,0,0.025) 4px
            );
        }

        /* Full-screen flex centering */
        #login-root {
            position: relative;
            z-index: 2;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ── Login card ─────────────────────────────────────────── */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.8rem 2.4rem 2.4rem;
            position: relative;
        }

        /* Corner brackets — reuse dashboard pattern */
        .corner-bracket {
            position: absolute;
            width: 14px;
            height: 14px;
            pointer-events: none;
        }
        .corner-bracket--tl { top:10px; left:10px;  border-top:1.5px solid var(--p2); border-left:1.5px solid var(--p2); }
        .corner-bracket--tr { top:10px; right:10px; border-top:1.5px solid var(--p1); border-right:1.5px solid var(--p1); }
        .corner-bracket--bl { bottom:10px; left:10px;  border-bottom:1.5px solid var(--p1); border-left:1.5px solid var(--p1); }
        .corner-bracket--br { bottom:10px; right:10px; border-bottom:1.5px solid var(--p2); border-right:1.5px solid var(--p2); }

        /* Radial inner glow (like clock panel) */
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: radial-gradient(
                ellipse 80% 60% at 50% 0%,
                rgba(139,92,246,0.12) 0%,
                transparent 70%
            );
            pointer-events: none;
        }

        /* ── Brand block ────────────────────────────────────────── */
        .login-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 2.2rem;
            position: relative;
        }
        .login-bolt {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 10px rgba(251,191,36,0.9))
                    drop-shadow(0 0 28px rgba(251,191,36,0.4));
            animation: boltFlicker 5s ease-in-out infinite;
            display: block;
        }
        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            background: linear-gradient(120deg, var(--p0) 0%, var(--p1) 45%, var(--p2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            line-height: 1.15;
        }
        .login-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.64rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(216,180,254,0.38);
            text-align: center;
            margin-top: 0.1rem;
        }

        /* Thin separator line */
        .login-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--p2), transparent);
            box-shadow: 0 0 8px rgba(168,85,247,0.5);
            margin: 0 auto 2rem;
        }

        /* ── Feature pills ──────────────────────────────────────── */
        .login-features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.45rem;
            margin-bottom: 2rem;
        }
        .feature-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.75rem;
            background: rgba(139,92,246,0.08);
            border: 1px solid rgba(139,92,246,0.18);
            border-radius: var(--radius-full);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: rgba(216,180,254,0.65);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .feature-pill:hover {
            border-color: rgba(168,85,247,0.35);
            color: var(--p1);
            background: rgba(139,92,246,0.13);
        }

        /* ── Google sign-in button ──────────────────────────────── */
        #google-signin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.82rem 1.4rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(139,92,246,0.32);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition:
                background 0.22s,
                border-color 0.22s,
                box-shadow 0.22s,
                transform 0.18s var(--ease-spring);
            position: relative;
            overflow: hidden;
        }

        /* Shimmer sweep on hover */
        #google-signin-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(168,85,247,0.07) 50%,
                transparent 70%
            );
            transform: translateX(-100%);
            transition: transform 0.5s var(--ease);
        }
        #google-signin-btn:hover::after { transform: translateX(100%); }
        #google-signin-btn:hover {
            background: rgba(139,92,246,0.10);
            border-color: rgba(168,85,247,0.55);
            box-shadow: 0 0 0 2px rgba(139,92,246,0.14), var(--glow-sm);
            transform: translateY(-1px);
        }
        #google-signin-btn:active { transform: translateY(0); opacity: 0.88; }
        #google-signin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Google colour logo via SVG inline */
        .google-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
        }

        /* ── Loading spinner inside button ──────────────────────── */
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(139,92,246,0.25);
            border-top-color: var(--p2);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            flex-shrink: 0;
        }

        /* ── Error message ──────────────────────────────────────── */
        #login-error {
            margin-top: 1rem;
            padding: 0.65rem 0.9rem;
            background: rgba(248,113,113,0.07);
            border: 1px solid rgba(248,113,113,0.28);
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-align: center;
            display: none;
            animation: fadeInUp 0.25s var(--ease) both;
        }
        #login-error.visible { display: block; }

        /* ── Footer note ────────────────────────────────────────── */
        .login-footer {
            margin-top: 1.8rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.10em;
            color: rgba(216,180,254,0.22);
        }

        /* ── Entrance animation for the card ────────────────────── */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }
        .login-card { animation: cardIn 0.55s var(--ease) both; }

        /* ── Responsive ─────────────────────────────────────────── */
        @media (max-width: 480px) {
            .login-card { padding: 2.2rem 1.5rem 1.8rem; }
            .login-title { font-size: 1.2rem; }
            .login-bolt  { font-size: 1.85rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="scanlines" aria-hidden="true"></div>

    <div id="login-root">
        <div class="login-card glass-card" role="main">
            <i class="corner-bracket corner-bracket--tl" aria-hidden="true"></i>
            <i class="corner-bracket corner-bracket--tr" aria-hidden="true"></i>
            <i class="corner-bracket corner-bracket--bl" aria-hidden="true"></i>
            <i class="corner-bracket corner-bracket--br" aria-hidden="true"></i>

            <div class="login-brand">
                <span class="login-bolt" aria-hidden="true">⚡</span>
                <h1 class="login-title">Task Manager</h1>
                <p class="login-subtitle">◈ Your workspace awaits ◈</p>
            </div>

            <div class="login-divider" aria-hidden="true"></div>

            <div class="login-features" aria-label="Features">
                <span class="feature-pill"><span aria-hidden="true">🎯</span> Task Tracking</span>
                <span class="feature-pill"><span aria-hidden="true">⚡</span> XP System</span>
                <span class="feature-pill"><span aria-hidden="true">⏰</span> Deadlines</span>
                <span class="feature-pill"><span aria-hidden="true">📈</span> Progress</span>
            </div>

            <button id="google-signin-btn" aria-label="Sign in with Google">
                <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span id="signin-btn-text">Continue with Google</span>
            </button>

            <div id="login-error" role="alert" aria-live="assertive"></div>

            <p class="login-footer">
                v1.0 &nbsp;·&nbsp; Secured via Firebase Auth
            </p>
        </div>
    </div><script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        (() => {
            'use strict';

            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d', { alpha: false });
            const DPR = Math.min(window.devicePixelRatio || 1, 2);

            let W, H;

            const FONT       = 22;
            const DROP_SPEED = 0.07;
            const TRAIL_LEN  = 12;
            const HEAD_BLUR  = 12;

            const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモラリルレロワヲン01';
            const isMobile = () => W <= 600;

            let columns = [];

            function initCols() {
                const n = Math.floor(W / FONT);
                columns = Array.from({ length: n }, () => ({
                    pos:   -(Math.random() * (H / FONT) * 1.8),
                    speed: DROP_SPEED * (0.75 + Math.random() * 0.50),
                    chars: Array.from({ length: TRAIL_LEN },
                           () => CHARS[(Math.random() * CHARS.length) | 0]),
                    phase: Math.random() * Math.PI * 2,
                }));
            }

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width        = W * DPR;
                canvas.height       = H * DPR;
                canvas.style.width  = W + 'px';
                canvas.style.height = H + 'px';
                ctx.scale(DPR, DPR);
                initCols();
            }

            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);
                ctx.font = `${FONT}px "JetBrains Mono", monospace`;

                const mobile = isMobile();

                for (let i = 0; i < columns.length; i++) {
                    const col = columns[i];
                    col.phase += 0.015;
                    col.pos   += col.speed;

                    if (Math.random() < 0.35) {
                        const slot = (Math.random() * TRAIL_LEN) | 0;
                        col.chars[slot] = CHARS[(Math.random() * CHARS.length) | 0];
                    }

                    const headRow = Math.floor(col.pos);
                    const x       = i * FONT;

                    for (let t = 0; t < TRAIL_LEN; t++) {
                        const row = headRow - t;
                        if (row < 0 || row * FONT > H) continue;
                        
                        const y       = row * FONT;
                        const ratio   = t / (TRAIL_LEN - 1);
                        const opacity = Math.pow(1 - ratio, 2.2);

                        if (t === 0) {
                            const pulse = 0.82 + 0.12 * Math.sin(col.phase);
                            if (!mobile) {
                                ctx.shadowColor = 'rgba(190, 80, 255, 0.70)';
                                ctx.shadowBlur  = HEAD_BLUR;
                            }
                            ctx.fillStyle = `rgba(220, 140, 255, ${pulse.toFixed(2)})`;
                            ctx.fillText(col.chars[0], x, y);
                            if (!mobile) {
                                ctx.shadowBlur  = 0;
                                ctx.shadowColor = 'transparent';
                            }
                        } else {
                            ctx.fillStyle = `rgba(160, 60, 240, ${(opacity * 0.75).toFixed(3)})`;
                            ctx.fillText(col.chars[t], x, y);
                        }
                    }

                    if (col.pos * FONT > H + TRAIL_LEN * FONT) {
                        col.pos   = -(Math.random() * (H / FONT) * 0.6);
                        col.speed = DROP_SPEED * (0.75 + Math.random() * 0.50);
                        col.phase = Math.random() * Math.PI * 2;
                    }
                }
            }

            function loop() { draw(); requestAnimationFrame(loop); }

            resize();
            loop();

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resize, 150);
            }, { passive: true });

        })();
    </script>
</body>
</html>
